version: '3.9'

services:

  api:
    build: .
    container_name: traffic_api
    ports:
      - "8000:8000"
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  dashboard:
    build: .
    container_name: traffic_dashboard
    ports:
      - "8501:8501"
    command: streamlit run streamlit_app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api
    restart: unless-stopped
